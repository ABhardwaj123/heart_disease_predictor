<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <div id="container">
        <h1>Heart Disease Predictor</h1>

        <div id="inputs">
            <div class="field">
                <label>Age</label>
                <input type="number" id="age">
            </div>
            <div class="field">
                <label>Sex (1=Male, 0=Female)</label>
                <input type="number" id="sex">
            </div>
            <div class="field">
                <label>Chest Pain Type (0-3)</label>
                <input type="number" id="cp">
            </div>
            <div class="field">
                <label>Resting Blood Pressure</label>
                <input type="number" id="trestbps">
            </div>
            <div class="field">
                <label>Cholesterol</label>
                <input type="number" id="chol">
            </div>
            <div class="field">
                <label>Fasting Blood Sugar >120mg (1=True, 0=False)</label>
                <input type="number" id="fbs">
            </div>
            <div class="field">
                <label>Resting ECG Results (0-2)</label>
                <input type="number" id="restecg">
            </div>
            <div class="field">
                <label>Max Heart Rate Achieved</label>
                <input type="number" id="thalach">
            </div>
            <div class="field">
                <label>Exercise Induced Angina (1=Yes, 0=No)</label>
                <input type="number" id="exang">
            </div>
            <div class="field">
                <label>ST Depression (oldpeak)</label>
                <input type="number" id="oldpeak" step="0.1">
            </div>
            <div class="field">
                <label>Slope of Peak Exercise ST (0-2)</label>
                <input type="number" id="slope">
            </div>
            <div class="field">
                <label>Number of Major Vessels (0-3)</label>
                <input type="number" id="ca">
            </div>
            <div class="field">
                <label>Thalassemia (1-3)</label>
                <input type="number" id="thal">
            </div>
            <button onclick="predict()">Predict</button>
            <div id="result"></div>
            
        </div>

    </div>

    <script src="app.js"></script>

</body>
</html>
